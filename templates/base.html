<!DOCTYPE html>
<html>

<head>

    <title>
        {% block title %}CodeCoach AI{% endblock %}
    </title>

    <link rel="stylesheet" href="/static/style.css">

</head>


<body>


<nav class="navbar">

    <div class="logo">
        🤖 CodeCoach AI
    </div>


    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/analyze">
            Analyze
        </a>

        <a href="/history">
            History
        </a>


        {% if session.get("user_id") %}

            <span class="username">
                Hi, {{ session.get("username") }}
            </span>

            <a href="/logout">
                Logout
            </a>

        {% else %}

            <a href="/login">
                Login
            </a>

            <a href="/signup">
                Sign Up
            </a>

        {% endif %}

    </div>

</nav>



<div class="container">

    {% block content %}

    {% endblock %}

</div>


</body>

</html>
