{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>🔑 Login</h1>

<form method="POST">

    <label>Username</label>
    <input
        type="text"
        name="username"
        required
    >

    <label>Password</label>
    <input
        type="password"
        name="password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<p>
    Don't have an account?
    <a href="/signup">Create one</a>
</p>

{% endblock %}
