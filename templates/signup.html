{% extends "base.html" %}

{% block title %}
Sign Up
{% endblock %}

{% block content %}

<h1>Create Account</h1>

<form method="POST">

    <label>Username</label>
    <input
        type="text"
        name="username"
        required
    >

    <label>Password</label>
    <input
        type="password"
        name="password"
        required
    >

    <br><br>

    <button type="submit">
        Create Account
    </button>

</form>

<p>
    Already have an account?
    <a href="/login">Login</a>
</p>

{% endblock %}
